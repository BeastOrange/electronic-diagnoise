dataset:
  name: cognitive_radio_spectrum
  schema: tabular
  input_path: ../data/Cognitive Radio Spectrum Sensing Dataset.csv
  label_column: PU_Presence
task:
  type: classification
  task_name: pu_presence_physics_topk_20
  target_column: PU_Presence
  metric_primary: accuracy
  metric_secondary: f1
  drop_leakage_columns:
    - time_index
    - PU_bandwidth
    - PU_burst_duration
    - PU_drift_type
features:
  method: hybrid
  top_k: 20
  domain_feature_groups:
    enabled:
      - cognitive_radio_physics
model:
  name: bagged_logistic_regression
  candidates:
    - bagged_logistic_regression
  params:
    bagged_logistic_regression:
      n_estimators: 9
      c: 2.0
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: accuracy
visualization:
  theme: paper-bar
evaluation:
  threshold_tuning:
    enabled: true
    metric: f1
    grid:
      - 0.35
      - 0.40
      - 0.45
      - 0.50
      - 0.55
      - 0.60
  cross_validation:
    enabled: true
    folds: 5
  learning_curve:
    enabled: false
  ablation:
    enabled: false
runtime:
  prepared_dir: ../artifacts/prepared_cognitive_presence_physics_topk_20
  artifacts_dir: ../artifacts/runs
