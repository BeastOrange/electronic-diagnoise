dataset:
  name: electrical_fault_detection
  schema: tabular
  input_path: ../data/electrical_fault_detection/classData_fault_code.csv
  label_column: fault_code
task:
  type: classification
  task_name: electrical_fault_fault_code_cnn
  target_column: fault_code
  metric_primary: macro_f1
  metric_secondary: accuracy
  drop_leakage_columns:
    - G
    - C
    - B
    - A
features:
  method: hybrid
  top_k: full
model:
  name: cnn_1d
  candidates:
    - cnn_1d
    - random_forest
  epochs: 30
  batch_size: 64
  learning_rate: 0.001
  dropout: 0.2
  weight_decay: 0.0001
  patience: 6
  scheduler: plateau
  class_weighting: balanced
  loss_name: cross_entropy
  sequence_layout: all
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: macro_f1
visualization:
  theme: paper-bar
evaluation:
  cross_validation:
    enabled: true
    folds: 5
runtime:
  prepared_dir: ../artifacts/prepared_electrical_fault_fault_code_cnn
  artifacts_dir: ../artifacts/runs
