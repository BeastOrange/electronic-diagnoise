dataset:
  name: electrical_fault_detection
  schema: tabular
  input_path: ../data/electrical_fault_detection/classData_fault_code.csv
  label_column: fault_code
task:
  type: classification
  task_name: electrical_fault_qwen_vs_baselines
  target_column: fault_code
  metric_primary: macro_f1
  metric_secondary: accuracy
  drop_leakage_columns:
    - G
    - C
    - B
    - A
tasks:
  - name: fault_code
    task_name: fault_code
    target_column: fault_code
    metric_primary: macro_f1
    metric_secondary: accuracy
    drop_leakage_columns:
      - G
      - C
      - B
      - A
features:
  method: hybrid
  top_k: full
model:
  name: llm_qlora_classifier
  mode: single_task
  epochs: 4
  batch_size: 1
  learning_rate: 0.0001
  weight_decay: 0.01
  patience: 3
  class_weighting: balanced
  llm:
    model_id: /root/autodl-tmp/models/Qwen2.5-7B-Instruct
    max_length: 384
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.05
    load_in_4bit: true
    bnb_4bit_quant_type: nf4
    gradient_accumulation_steps: 16
    warmup_ratio: 0.03
    save_adapter_only: true
    gradient_checkpointing: true
    torch_dtype: float16
    feature_limit: null
benchmark:
  matrix:
    tasks:
      - fault_code
    models:
      - llm_qlora_classifier
      - cnn_1d
      - random_forest
    seeds:
      - 42
    modes:
      - single_task
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: macro_f1
visualization:
  theme: paper-bar
evaluation:
  threshold_tuning:
    enabled: false
  cross_validation:
    enabled: false
  learning_curve:
    enabled: false
  ablation:
    enabled: false
  risk_checks:
    enabled: true
    warning_threshold: 0.05
runtime:
  prepared_dir: ../artifacts/prepared_electrical_fault_qwen_vs_baselines
  artifacts_dir: ../artifacts/runs
