dataset:
  name: electrical_fault_detection
  schema: tabular
  input_path: ../data/electrical_fault_detection/detect_dataset.csv
  label_column: Output (S)
task:
  type: classification
  task_name: electrical_fault_binary_rf
  target_column: Output (S)
  metric_primary: accuracy
  metric_secondary: f1
features:
  method: hybrid
  top_k: full
model:
  name: random_forest
  candidates:
    - random_forest
    - bagged_logistic_regression
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: accuracy
visualization:
  theme: paper-bar
evaluation:
  cross_validation:
    enabled: true
    folds: 5
runtime:
  prepared_dir: ../artifacts/prepared_electrical_fault_binary_rf
  artifacts_dir: ../artifacts/runs
