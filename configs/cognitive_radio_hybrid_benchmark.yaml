dataset:
  name: cognitive_radio_spectrum
  schema: tabular
  input_path: ../data/Cognitive Radio Spectrum Sensing Dataset.csv
  label_column: PU_Presence
task:
  type: classification
  task_name: presence
  target_column: PU_Presence
  metric_primary: f1
  metric_secondary: accuracy
  drop_leakage_columns:
    - time_index
    - PU_Signal_Strength
    - PU_bandwidth
    - PU_drift_type
tasks:
  - name: presence
    task_name: presence
    target_column: PU_Presence
    metric_primary: f1
    metric_secondary: accuracy
    drop_leakage_columns:
      - time_index
      - PU_Signal_Strength
      - PU_bandwidth
      - PU_burst_duration
      - Frequency_Band
  - name: band
    task_name: band
    target_column: Frequency_Band
    metric_primary: accuracy
    metric_secondary: f1
    drop_leakage_columns:
      - time_index
      - PU_Presence
      - PU_drift_type
      - PU_burst_duration
  - name: burst
    task_name: burst
    target_column: PU_burst_duration
    metric_primary: accuracy
    metric_secondary: f1
    drop_leakage_columns:
      - time_index
      - PU_Presence
      - PU_drift_type
      - power_dB
      - PU_Signal_Strength
      - Frequency_Band
features:
  method: hybrid
  top_k: full
model:
  name: cognitive_radio_hybrid
  mode: single_task
  epochs: 100
  batch_size: 64
  learning_rate: 0.0005
  dropout: 0.2
  weight_decay: 0.0001
  patience: 16
  scheduler: plateau
  class_weighting: balanced
  hidden_dim: 256
  num_heads: 8
benchmark:
  matrix:
    tasks:
      - presence
      - band
      - burst
    models:
      - cognitive_radio_hybrid
    seeds:
      - 42
      - 52
    modes:
      - single_task
    transfer_strategies:
      - scratch
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: f1
visualization:
  theme: paper-bar
evaluation:
  threshold_tuning:
    enabled: true
    metric: f1
    grid:
      - 0.35
      - 0.40
      - 0.45
      - 0.50
      - 0.55
      - 0.60
      - 0.65
runtime:
  prepared_dir: ../artifacts/prepared_cognitive_hybrid_benchmark
  artifacts_dir: ../artifacts/runs
