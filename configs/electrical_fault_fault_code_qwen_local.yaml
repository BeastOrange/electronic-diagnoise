dataset:
  name: electrical_fault_detection
  schema: tabular
  input_path: ../data/electrical_fault_detection/classData_fault_code.csv
  label_column: fault_code
task:
  type: classification
  task_name: electrical_fault_fault_code_qwen
  target_column: fault_code
  metric_primary: macro_f1
  metric_secondary: accuracy
  drop_leakage_columns:
    - G
    - C
    - B
    - A
features:
  method: hybrid
  top_k: full
model:
  name: llm_qlora_classifier
  mode: single_task
  epochs: 22
  batch_size: 2
  learning_rate: 0.00005
  weight_decay: 0.01
  patience: 5
  class_weighting: balanced
  llm:
    model_id: Qwen/Qwen2.5-7B-Instruct
    max_length: 256
    lora_r: 8
    lora_alpha: 16
    lora_dropout: 0.1
    target_modules:
      - q_proj
      - k_proj
      - v_proj
      - o_proj
      - gate_proj
      - up_proj
      - down_proj
    load_in_4bit: true
    bnb_4bit_quant_type: nf4
    gradient_accumulation_steps: 8
    warmup_ratio: 0.06
    save_adapter_only: true
    gradient_checkpointing: true
    torch_dtype: float16
    feature_limit: 18
    task_instruction: Classify the EMC-related electrical fault pattern of this three-phase sample using phase currents, phase voltages, and derived imbalance indicators.
    label_descriptions:
      "0": "fault_0000 normal balanced three-phase operating state with no fault indicators"
      "1": "fault_0110 line-to-line fault between phase B and phase C without ground involvement"
      "2": "fault_0111 three-phase asymmetric fault across B-C with partial A coupling but NO ground path (ungrounded)"
      "3": "fault_1001 single-phase-to-ground fault on phase A only with ground path active"
      "4": "fault_1011 double-phase-to-ground fault involving phases A and C with ground path active"
      "5": "fault_1111 three-phase symmetrical fault with ground path active (all phases and ground involved)"
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: macro_f1
visualization:
  theme: paper-bar
evaluation:
  threshold_tuning:
    enabled: false
  cross_validation:
    enabled: false
  learning_curve:
    enabled: false
  ablation:
    enabled: false
  risk_checks:
    enabled: true
    warning_threshold: 0.05
runtime:
  prepared_dir: ../artifacts/prepared_electrical_fault_fault_code_qwen
  artifacts_dir: ../artifacts/runs
