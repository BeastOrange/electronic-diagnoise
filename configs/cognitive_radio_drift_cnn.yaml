dataset:
  name: cognitive_radio_spectrum
  schema: tabular
  input_path: ../data/Cognitive Radio Spectrum Sensing Dataset.csv
  label_column: PU_drift_type
task:
  type: classification
  task_name: pu_drift_type_cnn
  target_column: PU_drift_type
  metric_primary: accuracy
  metric_secondary: f1
  drop_leakage_columns:
    - time_index
    - PU_Presence
    - PU_bandwidth
    - PU_burst_duration
features:
  method: hybrid
  top_k: 60
model:
  name: cnn_1d
  candidates:
    - cnn_1d
    - cnn_lstm
  epochs: 40
  batch_size: 32
  learning_rate: 0.001
  dropout: 0.2
  weight_decay: 0.0001
  patience: 8
  scheduler: plateau
  class_weighting: balanced
  sequence_layout: all
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: accuracy
visualization:
  theme: paper-bar
evaluation:
  threshold_tuning:
    enabled: false
  cross_validation:
    enabled: false
  learning_curve:
    enabled: false
  ablation:
    enabled: false
  risk_checks:
    enabled: true
    warning_threshold: 0.05
runtime:
  prepared_dir: ../artifacts/prepared_cognitive_drift_physics
  artifacts_dir: ../artifacts/runs
