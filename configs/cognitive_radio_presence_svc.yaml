dataset:
  name: cognitive_radio_spectrum
  schema: tabular
  input_path: ../data/Cognitive Radio Spectrum Sensing Dataset.csv
  label_column: PU_Presence
task:
  type: classification
  task_name: cognitive_presence_svc
  target_column: PU_Presence
  metric_primary: f1
  metric_secondary: accuracy
  drop_leakage_columns:
    - time_index
    - PU_burst_duration
    - PU_drift_type
features:
  method: basic
  top_k: 16
model:
  name: svc
  mode: single_task
  candidates:
    - svc
  params:
    C: 2.0
    gamma: scale
    probability: true
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: f1
visualization:
  theme: paper-bar
evaluation:
  threshold_tuning:
    enabled: true
    metric: f1
    grid:
      - 0.40
      - 0.45
      - 0.50
      - 0.55
      - 0.60
runtime:
  prepared_dir: ../artifacts/prepared_cognitive_presence_svc
  artifacts_dir: ../artifacts/runs
