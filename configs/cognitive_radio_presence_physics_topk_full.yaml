dataset:
  name: cognitive_radio_spectrum
  schema: tabular
  input_path: ../data/Cognitive Radio Spectrum Sensing Dataset.csv
  label_column: PU_Presence
task:
  type: classification
  task_name: pu_presence_physics_topk_full
  target_column: PU_Presence
  metric_primary: accuracy
  metric_secondary: f1
  drop_leakage_columns:
    - time_index
    - PU_bandwidth
    - PU_burst_duration
    - PU_drift_type
features:
  method: hybrid
  top_k: full
model:
  name: bagged_logistic_regression
  candidates:
    - bagged_logistic_regression
    - random_forest
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
  dropout: 0.2
  weight_decay: 0.0001
  patience: 6
  scheduler: plateau
  class_weighting: balanced
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: accuracy
visualization:
  theme: paper-bar
evaluation:
  threshold_tuning:
    enabled: true
    metric: f1
    grid:
      - 0.35
      - 0.40
      - 0.45
      - 0.50
      - 0.55
      - 0.60
  cross_validation:
    enabled: true
    folds: 5
  learning_curve:
    enabled: false
  ablation:
    enabled: false
runtime:
  prepared_dir: ../artifacts/prepared_cognitive_presence_physics_topk_full
  artifacts_dir: ../artifacts/runs
