dataset:
  name: synthetic_emi
  schema: tabular
  input_path: ../data/synthetic_emi.csv
  label_column: label
task:
  type: classification
features:
  method: hybrid
  top_k: 3
model:
  name: random_forest
  epochs: 3
  batch_size: 8
  learning_rate: 0.001
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 7
metrics:
  primary: accuracy
visualization:
  theme: paper-bar
runtime:
  prepared_dir: ../artifacts/prepared
  artifacts_dir: ../artifacts/runs
