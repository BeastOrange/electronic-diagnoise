dataset:
  name: cognitive_radio_spectrum
  schema: tabular
  input_path: ../data/Cognitive Radio Spectrum Sensing Dataset.csv
  label_column: PU_Presence
task:
  type: classification
  task_name: presence_keep_strength
  target_column: PU_Presence
  metric_primary: accuracy
  metric_secondary: f1
  drop_leakage_columns:
    - time_index
    - PU_bandwidth
    - PU_burst_duration
    - PU_drift_type
tasks:
  - name: presence_keep_strength
    task_name: presence_keep_strength
    target_column: PU_Presence
    metric_primary: accuracy
    metric_secondary: f1
    drop_leakage_columns:
      - time_index
      - PU_bandwidth
      - PU_burst_duration
      - PU_drift_type
  - name: presence_drop_strength
    task_name: presence_drop_strength
    target_column: PU_Presence
    metric_primary: accuracy
    metric_secondary: f1
    drop_leakage_columns:
      - time_index
      - PU_Signal_Strength
      - PU_bandwidth
      - PU_burst_duration
      - PU_drift_type
features:
  method: hybrid
  top_k: full
model:
  name: bagged_logistic_regression
  mode: single_task
  candidates:
    - bagged_logistic_regression
  params: {}
  epochs: 20
  batch_size: 32
  learning_rate: 0.001
  dropout: 0.2
  weight_decay: 0.0001
  patience: 6
  scheduler: plateau
  class_weighting: balanced
benchmark:
  matrix:
    tasks:
      - presence_keep_strength
      - presence_drop_strength
    models:
      - bagged_logistic_regression
    seeds:
      - 42
    modes:
      - single_task
    transfer_strategies:
      - scratch
trainer:
  train_ratio: 0.7
  val_ratio: 0.15
  random_state: 42
metrics:
  primary: accuracy
visualization:
  theme: paper-bar
evaluation:
  threshold_tuning:
    enabled: true
    metric: f1
    grid:
      - 0.35
      - 0.40
      - 0.45
      - 0.50
      - 0.55
      - 0.60
  cross_validation:
    enabled: true
    folds: 5
  learning_curve:
    enabled: false
  ablation:
    enabled: false
  risk_checks:
    enabled: true
    warning_threshold: 0.05
runtime:
  prepared_dir: ../artifacts/prepared_cognitive_presence_signal_strength_ablation
  artifacts_dir: ../artifacts/runs
